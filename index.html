<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossmith Sales</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
  :root{
    --black:#121212; --lime:#B8FF00; --white:#FFFFFF; --grey:#3A3A3A;
    --panel:#1a1a1a; --panel2:#151515; --border:#2a2a2a; --muted:#8a8a8a; --danger:#c9645a; --warn:#c98a3a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--black);color:var(--white);font-family:'Sora',sans-serif;padding:0;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 80px;}
  #gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .gate-logo{width:56px;height:56px;border-radius:14px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--black);font-size:26px;margin-bottom:18px;}
  .gate-title{font-family:'Space Grotesk';font-weight:700;font-size:22px;margin-bottom:4px;}
  .gate-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
  .pin-display{display:flex;gap:10px;margin-bottom:22px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);}
  .pin-dot.filled{background:var(--lime);border-color:var(--lime);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
  .key{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 0;font-size:20px;font-weight:600;color:var(--white);cursor:pointer;font-family:'Space Grotesk';}
  .key:active{background:var(--lime);color:var(--black);}
  .gate-err{color:var(--danger);font-size:13px;margin-top:16px;height:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--black);font-size:15px;}
  .brand h1{font-family:'Space Grotesk';font-weight:700;font-size:16px;margin:0;letter-spacing:-0.2px;}
  .brand h1 span{color:var(--lime);}
  .role-chip{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;padding:5px 10px;border-radius:999px;background:rgba(184,255,0,0.14);color:var(--lime);cursor:pointer;border:none;}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{display:flex;align-items:center;gap:6px;background:transparent;color:#b5b5b5;border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;font-family:'Space Grotesk';cursor:pointer;white-space:nowrap;}
  .tab.active{background:var(--lime);color:var(--black);border:none;}
  .panel{display:none;}
  .panel.active{display:block;}
  label{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:#9a9a9a;font-family:'Space Grotesk';margin-bottom:12px;}
  input,select{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--white);font-size:14px;font-family:'Sora';outline:none;width:100%;}
  input:focus,select:focus{border-color:var(--lime);}
  .form-wrap{max-width:520px;display:flex;flex-direction:column;}
  .btn{background:var(--lime);color:var(--black);border:none;border-radius:10px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Space Grotesk';}
  .btn:disabled{background:var(--grey);color:#8a8a8a;cursor:not-allowed;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:#c9c9c9;border-radius:8px;padding:9px 12px;font-size:12.5px;cursor:pointer;font-family:'Sora';}
  .toggle{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--white);font-size:13px;cursor:pointer;margin-bottom:12px;width:100%;text-align:left;}
  .toggle.on{border-color:var(--lime);color:var(--lime);}
  .cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;flex:1 1 140px;}
  .card .label{font-size:11px;color:#8a8a8a;text-transform:uppercase;letter-spacing:0.4px;}
  .card .value{font-family:'Space Grotesk';font-weight:700;font-size:19px;margin-top:8px;}
  .card .sub{font-size:11px;color:#7a7a7a;margin-top:3px;}
  .section-title{font-family:'Space Grotesk';font-weight:700;font-size:14px;margin:20px 0 8px;}
  .item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .badge{background:#2a2a2a;color:#c9c9c9;font-size:11px;font-weight:600;letter-spacing:0.3px;padding:3px 8px;border-radius:999px;text-transform:uppercase;white-space:nowrap;}
  .badge.lime{background:rgba(184,255,0,0.14);color:var(--lime);}
  .badge.stage-New{background:rgba(255,255,255,0.08);color:#e8e8e8;}
  .badge.stage-Deposit{background:rgba(201,138,58,0.18);color:var(--warn);}
  .badge.stage-Progress{background:rgba(90,150,255,0.18);color:#7aa8ff;}
  .badge.stage-Closed{background:rgba(184,255,0,0.14);color:var(--lime);}
  .stat-row{display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px;color:#9a9a9a;gap:8px;flex-wrap:wrap;}
  .stat-row strong{color:var(--white);}
  .promo-hint{font-size:12px;background:rgba(184,255,0,0.08);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:12px;color:var(--lime);}
  .empty{color:#7a7a7a;font-size:13px;padding:24px 0;text-align:center;border:1px dashed var(--border);border-radius:10px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--black);font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none;z-index:50;}
  .toast.err{background:var(--danger);color:#fff;}
  .method-row{display:flex;gap:8px;margin-bottom:12px;}
  .method-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#b5b5b5;font-weight:600;font-size:13px;cursor:pointer;}
  .method-btn.active{border-color:var(--lime);background:rgba(184,255,0,0.1);color:var(--lime);}
  .stage-steps{display:flex;gap:6px;margin-top:10px;}
  .stage-step{flex:1;text-align:center;font-size:10.5px;font-weight:600;padding:6px 2px;border-radius:6px;background:#0f0f0f;border:1px solid var(--border);color:#7a7a7a;cursor:pointer;}
  .stage-step.done{background:rgba(184,255,0,0.12);border-color:var(--lime);color:var(--lime);}
  .chart{display:flex;align-items:flex-end;gap:6px;height:130px;padding:8px 0;border-bottom:1px solid var(--border);}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;height:100%;}
  .bar{width:100%;max-width:34px;background:var(--lime);border-radius:4px 4px 0 0;min-height:2px;}
  .bar-label{font-size:9.5px;color:#7a7a7a;}
  .bar-val{font-size:9px;color:#9a9a9a;}
  .setup-url{font-size:11px;color:#7a7a7a;margin:16px;word-break:break-all;}
  .rank-num{width:22px;height:22px;border-radius:50%;background:#0f0f0f;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--lime);margin-right:8px;}
</style>
</head>
<body>
<div id="setupBanner" class="setup-url" style="display:none;"></div>
<div id="gate">
  <div class="gate-logo">G</div>
  <div class="gate-title">Glossmith Sales</div>
  <div class="gate-sub">Enter your PIN</div>
  <div class="pin-display" id="pinDisplay"></div>
  <div class="keypad" id="keypad"></div>
  <div class="gate-err" id="gateErr"></div>
</div>
<div id="partnerView" class="wrap" style="display:none;"></div>
<div id="mainApp" class="wrap" style="display:none;">
  <div class="topbar">
    <div class="brand"><div class="logo">G</div><div><h1>Glossmith <span>Sales</span></h1></div></div>
    <button class="role-chip" id="roleChip" onclick="logout()">Staff · Lock</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="panel-dashboard" class="panel"></div>
  <div id="panel-log" class="panel"></div>
  <div id="panel-pipeline" class="panel"></div>
  <div id="panel-vehicles" class="panel"></div>
  <div id="panel-promos" class="panel"></div>
  <div id="panel-members" class="panel"></div>
  <div id="panel-reports" class="panel"></div>
</div>
<div id="toast" class="toast"></div>
<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzmMMTy7QJ9-1yOGgS_Ag-7lX4shk1HOXNxs6p4xoJMfQqmSLY5mvb0UbRkhw9ldeFW/exec";
const DISCOUNT_RATE=0.08, COMMISSION_RATE=0.10;
const CHANNELS=["WhatsApp","Website","Walk-in"];
const CATEGORIES=["Car Club","Influencer","Staff Referral","Other"];
const STAGES=["New","Deposit","Progress","Closed"];
const STAGE_LABELS={New:"New",Deposit:"Deposit paid",Progress:"In progress",Closed:"Closed"};

/* ============================================================
   SERVICE CATALOG — mirrors glossmith.com pricing exactly (Sedan/SUV).
   Used to auto-fill the sale amount once staff pick a service + vehicle class.
   ============================================================ */
const DETAIL = [
  { id:"bronze", name:"Bronze — Express Wash & Shine", price:[5000,7000] },
  { id:"silver", name:"Silver — Household Detail", price:[18000,22000] },
  { id:"gold", name:"Gold — Complete Detail", price:[40000,50000] },
  { id:"plat10", name:"Platinum 10H — 2-3 Year Coating", price:[90000,110000] },
  { id:"plat20", name:"Platinum 20H — Flagship Coating", price:[150000,180000] },
  { id:"newimport", name:"New Car Detailing", price:[45000,55000] },
];
const ADDONS = [
  { id:"paintcorr", name:"Paint Correction (3-Step Polish)", price:[22000,28000] },
  { id:"glasscoat", name:"Glass Coating (standalone)", price:[10000,12000] },
  { id:"acclean", name:"A/C Deep Clean & Decontamination", price:[3500,4500] },
  { id:"ceramic10", name:"Ceramic Coating 10H (Standalone)", price:[65000,80000] },
  { id:"ceramic20", name:"Ceramic Coating 20H (Standalone)", price:[110000,135000] },
];
const MEMBERSHIP_PKG = [
  { id:"standard", name:"Maintenance Club (per month)", price:[11700,15100] },
  { id:"ppf", name:"PPF Maintenance Club (per month)", price:[11700,15100] },
];
const PPF_COV = [
  { id:"partial", name:"PPF — Partial Front", price:{ xpel:[52000,52000], gloss:[58000,58000], matte:[62000,62000] } },
  { id:"fullfront", name:"PPF — Full Front", price:{ xpel:[100000,125000], gloss:[140000,170000], matte:[150000,180000] } },
  { id:"fullbody", name:"PPF — Full Body", price:{ xpel:[180000,220000], gloss:[350000,420000], matte:[370000,440000] } },
];
const PPF_FILM = [
  { id:"xpel", name:"XPEL Ultimate Plus" },
  { id:"gloss", name:"3M Scotchgard Pro 200 — Glossy" },
  { id:"matte", name:"3M Scotchgard Pro 200 — Matte" },
];
const TINT_COV = [
  { id:"fullcar", name:"Tint — Full Car", price:{ chinese:[25000,27500], ctx:[55000,59000], irx:[72000,77000] } },
  { id:"sidesrear", name:"Tint — Sides + Rear", price:{ chinese:[18000,20000], ctx:[39000,42000], irx:[51500,55000] } },
  { id:"windscreen", name:"Tint — Windscreen Only", price:{ chinese:[7000,8000], ctx:[16000,17000], irx:[20500,22000] } },
];
const TINT_FILM = [
  { id:"chinese", name:"Chinese (Value)" },
  { id:"ctx", name:"Llumar CTX (Mid)" },
  { id:"irx", name:"Llumar IRX / 3M Crystalline (Top)" },
];
const PROBLEMS = [
  { id:"wash",       group:"Exterior", name:"Dirty / dusty bodywork",            fix:"Exterior wash & shine",           price:[5000,7000] },
  { id:"heavy",      group:"Exterior", name:"Very dirty — mud, caked-on grime",  fix:"Heavy decontamination wash",      price:[8000,10000] },
  { id:"swirls",     group:"Exterior", name:"Swirls, scratches, dull paint",     fix:"3-step paint correction",         price:[22000,28000] },
  { id:"contam",     group:"Exterior", name:"Rough paint — tar, sap, overspray", fix:"Clay-bar decontamination",        price:[6000,8000] },
  { id:"trim",       group:"Exterior", name:"Faded black plastic trim",          fix:"Trim restoration & coating",      price:[6000,8000] },
  { id:"headlights", group:"Exterior", name:"Cloudy / yellow headlights",        fix:"Headlight restoration",           price:[5000,6000] },
  { id:"wheels",     group:"Exterior", name:"Dirty wheels, brake dust",          fix:"Wheel & arch deep clean",         price:[3500,4500] },
  { id:"glass",      group:"Exterior", name:"Water spots, poor rain visibility", fix:"Glass polish & coating",          price:[10000,12000] },
  { id:"intclean",   group:"Interior", name:"Dirty interior — dust, crumbs",     fix:"Interior vacuum & wipe-down",     price:[4000,5000] },
  { id:"seats",      group:"Interior", name:"Stained seats / carpets",           fix:"Shampoo & extraction",            price:[12000,15000] },
  { id:"dash",       group:"Interior", name:"Dull / faded dashboard & plastics", fix:"Interior dressing & restoration", price:[4000,5000] },
  { id:"leather",    group:"Interior", name:"Dry / dirty leather",               fix:"Leather deep clean & condition",  price:[6000,7500] },
  { id:"smell",      group:"Interior", name:"Smelly / musty A/C & cabin",        fix:"A/C deep clean & deodorise",      price:[3500,4500] },
  { id:"pethair",    group:"Interior", name:"Pet hair",                          fix:"Pet-hair removal",                price:[3000,4000] },
  { id:"engine",     group:"Extras",   name:"Dirty engine bay",                  fix:"Engine bay clean & dress",        price:[4000,5000] },
  { id:"newcar",     group:"Extras",   name:"Brand-new imported car",            fix:"New Car Detailing (salt decon)",  price:[45000,55000] },
];
const SERVICE_GROUPS=[
  {id:"package",label:"Package",items:DETAIL},
  {id:"addon",label:"Add-on",items:ADDONS},
  {id:"membership",label:"Membership",items:MEMBERSHIP_PKG},
  {id:"ppf",label:"PPF",items:PPF_COV},
  {id:"tint",label:"Window Tint",items:TINT_COV},
  {id:"problem",label:"By Problem",items:PROBLEMS},
];

let STATE={sales:[],promos:[],promoEvents:[],members:[],vehicles:[]};
let BUSY=false;
let ROLE=null, pinBuffer="";
let logForm={paymentMethod:"M-Pesa",closed:false,cashConfirmed:false,vehicleClass:0,svcGroup:"package",svcItem:"",svcFilm:"",cart:[],noteEdited:false};
const money=n=>"KSh "+Number(n||0).toLocaleString("en-KE",{maximumFractionDigits:0});
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function showToast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className="toast"+(e?" err":"");t.style.display="block";setTimeout(()=>t.style.display="none",2400);}
async function api(action,payload){const r=await fetch(WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,payload:payload||{}})});return r.json();}
async function loadData(){const r=await fetch(WEB_APP_URL);const d=await r.json();
  STATE.sales=(d.sales||[]).map(s=>({...s,closed:s.closed===true||s.closed==="TRUE"||s.closed==="true",stage:s.stage||deriveStage(s)}));
  STATE.promos=d.promos||[];STATE.promoEvents=d.promoEvents||[];STATE.members=d.members||[];STATE.vehicles=d.vehicles||[];}
function findVehicle(plate){const p=String(plate||"").trim().toUpperCase();if(!p)return null;return STATE.vehicles.find(v=>String(v.plate).trim().toUpperCase()===p)||null;}
function vehicleSales(plate){const p=String(plate||"").trim().toUpperCase();return STATE.sales.filter(s=>String(s.plate||"").trim().toUpperCase()===p);}
function deriveStage(s){if(s.closed===true||s.closed==="TRUE"||s.closed==="true")return"Closed";if(Number(s.deposit||0)>0)return"Deposit";return"New";}
function promoByCode(c){return STATE.promos.find(p=>String(p.code).toUpperCase()===String(c).toUpperCase());}
function promoStats(code){const sales=STATE.sales.filter(s=>s.promoCode&&String(s.promoCode).toUpperCase()===String(code).toUpperCase());const events=STATE.promoEvents.filter(e=>String(e.code).toUpperCase()===String(code).toUpperCase());const closed=sales.filter(s=>s.stage==="Closed");return{siteUses:events.length,bookings:sales.length,closed:closed.length,commission:closed.reduce((a,s)=>a+Number(s.finalAmount||0)*COMMISSION_RATE,0),revenue:closed.reduce((a,s)=>a+Number(s.finalAmount||0),0)};}

function buildKeypad(){const kp=document.getElementById("keypad");const keys=["1","2","3","4","5","6","7","8","9","del","0","ok"];kp.innerHTML=keys.map(k=>k==="del"?'<button class="key" data-k="del">&#9003;</button>':k==="ok"?'<button class="key" data-k="ok">&#10003;</button>':`<button class="key" data-k="${k}">${k}</button>`).join("");kp.querySelectorAll(".key").forEach(b=>b.addEventListener("click",()=>pressKey(b.dataset.k)));renderPinDots();}
function renderPinDots(){document.getElementById("pinDisplay").innerHTML=Array.from({length:Math.max(4,pinBuffer.length)}).map((_,i)=>`<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`).join("");}
function pressKey(k){document.getElementById("gateErr").textContent="";if(k==="del"){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}if(k==="ok"){submitPin();return;}if(pinBuffer.length<8){pinBuffer+=k;renderPinDots();}}
async function submitPin(){if(!pinBuffer)return;document.getElementById("gateErr").textContent="Checking...";try{const res=await api("checkPin",{pin:pinBuffer});if(res.role){ROLE=res.role;sessionStorage.setItem("gs_role",ROLE);pinBuffer="";enterApp();}else{document.getElementById("gateErr").textContent="Wrong PIN";pinBuffer="";renderPinDots();}}catch(e){document.getElementById("gateErr").textContent="Connection error - try again";}}
function logout(){sessionStorage.removeItem("gs_role");ROLE=null;pinBuffer="";document.getElementById("mainApp").style.display="none";document.getElementById("gate").style.display="flex";renderPinDots();}

function buildTabs(){const all=[{id:"dashboard",label:"Dashboard",owner:true},{id:"log",label:"Log Sale",owner:false},{id:"pipeline",label:"Pipeline",owner:false},{id:"vehicles",label:"Vehicles",owner:false},{id:"promos",label:"Promo Codes",owner:false},{id:"members",label:"Membership",owner:false},{id:"reports",label:"Reports",owner:true}];const visible=all.filter(t=>ROLE==="owner"?true:!t.owner);const tabsEl=document.getElementById("tabs");tabsEl.innerHTML=visible.map((t,i)=>`<button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.label}</button>`).join("");tabsEl.querySelectorAll(".tab").forEach(btn=>btn.addEventListener("click",()=>{tabsEl.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));btn.classList.add("active");document.getElementById("panel-"+btn.dataset.tab).classList.add("active");}));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.getElementById("panel-"+visible[0].id).classList.add("active");}
async function enterApp(){document.getElementById("gate").style.display="none";document.getElementById("mainApp").style.display="block";document.getElementById("roleChip").textContent=(ROLE==="owner"?"Owner":"Staff")+" - Lock";buildTabs();await loadData();renderAll();}

function computeStats(){const closed=STATE.sales.filter(s=>s.stage==="Closed");const totalRevenue=closed.reduce((a,s)=>a+Number(s.finalAmount||0),0);const totalDeposits=STATE.sales.reduce((a,s)=>a+Number(s.deposit||0),0);const balanceOutstanding=STATE.sales.reduce((a,s)=>a+Math.max(0,Number(s.finalAmount||0)-Number(s.deposit||0)),0);const mpesa=STATE.sales.filter(s=>s.paymentMethod==="M-Pesa").reduce((a,s)=>a+Number(s.deposit||0),0);const cash=STATE.sales.filter(s=>s.paymentMethod==="Cash").reduce((a,s)=>a+Number(s.deposit||0),0);const commissionOwed=closed.filter(s=>s.promoCode).reduce((a,s)=>a+Number(s.finalAmount||0)*COMMISSION_RATE,0);const influencerEngagements=STATE.sales.filter(s=>{const p=promoByCode(s.promoCode);return p&&p.category==="Influencer";}).length;return{closedCount:closed.length,openCount:STATE.sales.length-closed.length,totalRevenue,totalDeposits,balanceOutstanding,mpesa,cash,commissionOwed,influencerEngagements};}
function renderDashboard(){const el=document.getElementById("panel-dashboard");if(ROLE!=="owner"){el.innerHTML="";return;}const s=computeStats();el.innerHTML=`<div style="font-size:11px;color:#8a8a8a;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.4px;">Owner view - full visibility</div><div class="cards"><div class="card"><div class="label">Revenue (closed)</div><div class="value">${money(s.totalRevenue)}</div><div class="sub">${s.closedCount} closed &middot; ${s.openCount} open</div></div><div class="card"><div class="label">Deposits in</div><div class="value">${money(s.totalDeposits)}</div><div class="sub">M-Pesa ${money(s.mpesa)} &middot; Cash ${money(s.cash)}</div></div><div class="card"><div class="label">Balance owed to you</div><div class="value">${money(s.balanceOutstanding)}</div></div><div class="card"><div class="label">Commission owed</div><div class="value">${money(s.commissionOwed)}</div><div class="sub">${STATE.promos.length} codes &middot; ${s.influencerEngagements} influencer jobs</div></div></div><div class="section-title">This month</div>${renderMiniMonth()}<div class="section-title">Top partners</div>${renderPartnerRanking(3)}`;}
function renderMiniMonth(){const now=new Date();const ym=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");const ms=STATE.sales.filter(s=>String(s.timestamp).slice(0,7)===ym);const cl=ms.filter(s=>s.stage==="Closed");const rev=cl.reduce((a,s)=>a+Number(s.finalAmount||0),0);return `<div class="item"><div class="stat-row"><span>Bookings <strong>${ms.length}</strong></span><span>Closed <strong>${cl.length}</strong></span><span>Revenue <strong style="color:var(--lime);">${money(rev)}</strong></span></div></div>`;}

function renderLog(){const el=document.getElementById("panel-log");el.innerHTML=`<div class="form-wrap"><div style="font-size:11px;color:#8a8a8a;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:12px;">Log a WhatsApp, website or walk-in booking</div><label>Plate number<input id="f_plate" placeholder="e.g. KDS 112Z" style="text-transform:uppercase;"></label><div id="f_plateHint"></div><label>Client name<input id="f_clientName"></label><label>Phone number<input id="f_phone" placeholder="07XX XXX XXX"></label><label>Booking channel<select id="f_channel">${CHANNELS.map(c=>`<option>${c}</option>`).join("")}</select></label><label>Vehicle class</label><div class="method-row"><button type="button" class="method-btn ${logForm.vehicleClass==0?'active':''}" id="vc_sedan">Saloon / Sedan</button><button type="button" class="method-btn ${logForm.vehicleClass==1?'active':''}" id="vc_suv">SUV / Crossover</button></div><div style="font-size:11px;color:#8a8a8a;text-transform:uppercase;letter-spacing:0.4px;margin:16px 0 8px;">Add services — pick as many as this job needs</div><label>Service category<select id="f_svcGroup">${SERVICE_GROUPS.map(g=>`<option value="${g.id}" ${g.id===logForm.svcGroup?'selected':''}>${g.label}</option>`).join("")}</select></label><label>Service<select id="f_svcItem"></select></label><div id="f_svcFilmWrap"></div><div id="f_svcPreview"></div><button type="button" class="btn-outline" id="f_addSvc" style="width:100%;margin-bottom:6px;">+ Add service</button><div id="f_cartList"></div><div class="item" style="margin-top:10px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:12.5px;color:#9a9a9a;">Total service amount</span><strong id="f_cartTotal" style="color:var(--lime);font-size:16px;font-family:'Space Grotesk';">KSh 0</strong></div><label style="margin-top:12px;">Service description (auto-filled from services added — edit if needed)<input id="f_serviceNote" placeholder="e.g. Full PPF - Nissan Note"></label><label>Promo code (optional)<input id="f_promoCode" placeholder="e.g. NAIROBICLUB"></label><div id="f_promoHint"></div><label>Deposit received (KSh)<input id="f_deposit" type="number" inputmode="numeric"></label><div id="f_balanceHint" style="font-size:12px;color:#9a9a9a;margin-bottom:12px;"></div><label>Payment method</label><div class="method-row"><button type="button" class="method-btn active" id="m_mpesa">M-Pesa</button><button type="button" class="method-btn" id="m_cash">Cash</button></div><div id="f_paymentField"></div><label>Logged by (staff name, optional)<input id="f_loggedBy"></label><button type="button" class="toggle" id="f_closedToggle">&#9675; Mark as closed sale (job confirmed, not just deposit)</button><button type="button" class="btn" id="f_submit">Save reservation</button><div id="f_note" style="font-size:11.5px;color:#7a7a7a;margin-top:8px;"></div></div>`;
  renderPaymentField();renderSvcItemOptions();renderSvcFilmField();updateSvcPreview();renderCartUI();updatePromoHint();updateBalanceHint();
  document.getElementById("f_plate").addEventListener("input",onPlateInput);
  document.getElementById("f_plate").addEventListener("blur",onPlateBlur);
  document.getElementById("f_promoCode").addEventListener("input",()=>{updatePromoHint();updateBalanceHint();});
  document.getElementById("f_serviceNote").addEventListener("input",()=>{logForm.noteEdited=true;});
  document.getElementById("f_deposit").addEventListener("input",updateBalanceHint);
  document.getElementById("vc_sedan").addEventListener("click",()=>{logForm.vehicleClass=0;document.getElementById("vc_sedan").classList.add("active");document.getElementById("vc_suv").classList.remove("active");updateSvcPreview();renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();});
  document.getElementById("vc_suv").addEventListener("click",()=>{logForm.vehicleClass=1;document.getElementById("vc_suv").classList.add("active");document.getElementById("vc_sedan").classList.remove("active");updateSvcPreview();renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();});
  document.getElementById("f_svcGroup").addEventListener("change",e=>{logForm.svcGroup=e.target.value;logForm.svcItem="";renderSvcItemOptions();renderSvcFilmField();updateSvcPreview();});
  document.getElementById("f_svcItem").addEventListener("change",e=>{logForm.svcItem=e.target.value;updateSvcPreview();});
  document.getElementById("f_addSvc").addEventListener("click",addToCart);
  document.getElementById("m_mpesa").addEventListener("click",()=>{logForm.paymentMethod="M-Pesa";renderPaymentField();});
  document.getElementById("m_cash").addEventListener("click",()=>{logForm.paymentMethod="Cash";renderPaymentField();});
  document.getElementById("f_closedToggle").addEventListener("click",()=>{logForm.closed=!logForm.closed;const b=document.getElementById("f_closedToggle");b.classList.toggle("on",logForm.closed);b.innerHTML=(logForm.closed?"&#9679; ":"&#9675; ")+"Mark as closed sale (job confirmed, not just deposit)";});
  document.getElementById("f_submit").addEventListener("click",submitSale);
}
function onPlateInput(e){e.target.value=e.target.value.toUpperCase();}
function onPlateBlur(){const plate=document.getElementById("f_plate").value.trim();const hint=document.getElementById("f_plateHint");if(!plate){hint.innerHTML="";return;}const v=findVehicle(plate);if(!v){hint.innerHTML=`<div style="font-size:11.5px;color:#7a7a7a;margin:-6px 0 12px;">New plate — a vehicle record will be created automatically when you save.</div>`;return;}const sales=vehicleSales(plate);hint.innerHTML=`<div style="font-size:11.5px;color:var(--lime);margin:-6px 0 12px;">Known vehicle — ${sales.length} previous visit${sales.length===1?"":"s"}${v.ownerName?" · "+esc(v.ownerName):""}</div>`;const nameF=document.getElementById("f_clientName");const phoneF=document.getElementById("f_phone");if(!nameF.value.trim()&&v.ownerName)nameF.value=v.ownerName;if(!phoneF.value.trim()&&v.phone)phoneF.value=v.phone;if(v.vehicleClass!==""&&v.vehicleClass!==undefined&&v.vehicleClass!==null){logForm.vehicleClass=Number(v.vehicleClass)||0;document.getElementById("vc_sedan").classList.toggle("active",logForm.vehicleClass==0);document.getElementById("vc_suv").classList.toggle("active",logForm.vehicleClass==1);updateSvcPreview();renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();}}
function renderSvcItemOptions(){const g=SERVICE_GROUPS.find(g=>g.id===logForm.svcGroup);const sel=document.getElementById("f_svcItem");if(!g){sel.innerHTML="";return;}
  if(g.id==="problem"){const groups={};g.items.forEach(i=>{(groups[i.group]=groups[i.group]||[]).push(i);});sel.innerHTML='<option value="">— Select —</option>'+Object.keys(groups).map(gr=>`<optgroup label="${gr}">${groups[gr].map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("")}</optgroup>`).join("");}
  else{sel.innerHTML='<option value="">— Select —</option>'+g.items.map(i=>`<option value="${i.id}">${esc(i.name)}</option>`).join("");}
  if(logForm.svcItem)sel.value=logForm.svcItem;
}
function renderSvcFilmField(){const wrap=document.getElementById("f_svcFilmWrap");const needsFilm=logForm.svcGroup==="ppf"||logForm.svcGroup==="tint";if(!needsFilm){wrap.innerHTML="";logForm.svcFilm="";return;}const opts=logForm.svcGroup==="ppf"?PPF_FILM:TINT_FILM;if(!logForm.svcFilm)logForm.svcFilm=opts[0].id;wrap.innerHTML=`<label>Film<select id="f_svcFilm">${opts.map(f=>`<option value="${f.id}" ${f.id===logForm.svcFilm?'selected':''}>${esc(f.name)}</option>`).join("")}</select></label>`;document.getElementById("f_svcFilm").addEventListener("change",e=>{logForm.svcFilm=e.target.value;updateSvcPreview();});}
function computeServicePrice(){const g=SERVICE_GROUPS.find(g=>g.id===logForm.svcGroup);if(!g||!logForm.svcItem)return null;const item=g.items.find(i=>i.id===logForm.svcItem);if(!item)return null;const vc=logForm.vehicleClass;
  if(g.id==="ppf"||g.id==="tint"){const film=logForm.svcFilm;if(!film||!item.price[film])return null;const filmOpts=g.id==="ppf"?PPF_FILM:TINT_FILM;const filmName=(filmOpts.find(f=>f.id===film)||{}).name||"";return{price:item.price[film][vc],label:item.name+" — "+filmName};}
  if(g.id==="problem")return{price:item.price[vc],label:item.fix};
  return{price:item.price[vc],label:item.name};
}
function updateSvcPreview(){const el=document.getElementById("f_svcPreview");const r=computeServicePrice();if(!r){el.innerHTML="";return;}el.innerHTML=`<div class="promo-hint">${esc(r.label)} · ${logForm.vehicleClass==1?"SUV":"Saloon"} pricing · <strong>${money(r.price)}</strong></div>`;}
function cartEntryInfo(entry){const g=SERVICE_GROUPS.find(g=>g.id===entry.groupId);if(!g)return null;const item=g.items.find(i=>i.id===entry.itemId);if(!item)return null;const vc=logForm.vehicleClass;
  if(entry.groupId==="ppf"||entry.groupId==="tint"){const film=entry.filmId;if(!film||!item.price[film])return null;const filmOpts=entry.groupId==="ppf"?PPF_FILM:TINT_FILM;const filmName=(filmOpts.find(f=>f.id===film)||{}).name||"";return{label:item.name+" — "+filmName,price:item.price[film][vc]};}
  if(entry.groupId==="problem")return{label:item.fix,price:item.price[vc]};
  return{label:item.name,price:item.price[vc]};
}
function cartTotal(){return logForm.cart.reduce((sum,e)=>{const info=cartEntryInfo(e);return sum+(info?info.price:0);},0);}
function cartLabelsJoined(){return logForm.cart.map(e=>{const info=cartEntryInfo(e);return info?info.label:"";}).filter(Boolean).join(" + ");}
function syncServiceNote(){if(logForm.noteEdited)return;const f=document.getElementById("f_serviceNote");if(f)f.value=cartLabelsJoined();}
function addToCart(){if(!logForm.svcItem)return;if((logForm.svcGroup==="ppf"||logForm.svcGroup==="tint")&&!logForm.svcFilm)return;logForm.cart.push({groupId:logForm.svcGroup,itemId:logForm.svcItem,filmId:logForm.svcFilm||""});logForm.svcItem="";logForm.svcFilm="";renderSvcItemOptions();renderSvcFilmField();updateSvcPreview();renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();}
function removeFromCart(idx){logForm.cart.splice(idx,1);renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();}
function renderCartUI(){const el=document.getElementById("f_cartList");if(!el)return;
  if(logForm.cart.length===0){el.innerHTML=`<div style="font-size:11.5px;color:#7a7a7a;padding:6px 0;">No services added yet — pick one above and tap "+ Add service".</div>`;}
  else{el.innerHTML=logForm.cart.map((e,i)=>{const info=cartEntryInfo(e)||{label:"?",price:0};return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border);font-size:12.5px;"><span>${esc(info.label)}</span><span style="display:flex;align-items:center;gap:10px;"><strong>${money(info.price)}</strong><button type="button" onclick="removeFromCart(${i})" style="background:none;border:none;color:var(--danger);font-size:17px;line-height:1;cursor:pointer;padding:0 2px;">&times;</button></span></div>`;}).join("");}
  const totalEl=document.getElementById("f_cartTotal");if(totalEl)totalEl.textContent=money(cartTotal());
}
function renderPaymentField(){document.getElementById("m_mpesa").classList.toggle("active",logForm.paymentMethod==="M-Pesa");document.getElementById("m_cash").classList.toggle("active",logForm.paymentMethod==="Cash");const f=document.getElementById("f_paymentField");if(logForm.paymentMethod==="M-Pesa"){f.innerHTML=`<label>M-Pesa confirmation code<input id="f_mpesaCode" placeholder="e.g. QCH7XXXXX" style="text-transform:uppercase;"></label>`;}else{f.innerHTML=`<button type="button" class="toggle ${logForm.cashConfirmed?'on':''}" id="f_cashToggle">${logForm.cashConfirmed?"&#9679;":"&#9675;"} Cash physically received and counted</button>`;document.getElementById("f_cashToggle").addEventListener("click",()=>{logForm.cashConfirmed=!logForm.cashConfirmed;renderPaymentField();});}}
function updatePromoHint(){const code=document.getElementById("f_promoCode").value.trim();const hint=document.getElementById("f_promoHint");if(!code){hint.innerHTML="";return;}const m=promoByCode(code);const amt=cartTotal();if(m){const fin=Math.round(amt*(1-DISCOUNT_RATE));hint.innerHTML=`<div class="promo-hint">${esc(m.owner)} &middot; 8% off (-${money(amt-fin)}) &middot; final ${money(fin)} &middot; 10% commission (${money(fin*COMMISSION_RATE)}) on close</div>`;}else{hint.innerHTML=`<div style="font-size:12px;color:var(--warn);margin-bottom:12px;">Code not found - won't be linked to a partner.</div>`;}}
function updateBalanceHint(){const amt=cartTotal();const dep=Number(document.getElementById("f_deposit").value||0);const m=promoByCode(document.getElementById("f_promoCode").value.trim());const fin=m?Math.round(amt*(1-DISCOUNT_RATE)):amt;document.getElementById("f_balanceHint").innerHTML=(amt&&dep)?`Balance remaining: <strong style="color:#fff;">${money(Math.max(0,fin-dep))}</strong>`:"";}
async function submitSale(){const g=id=>document.getElementById(id);const clientName=g("f_clientName").value.trim();const plate=g("f_plate").value.trim().toUpperCase();const amount=cartTotal();const deposit=Number(g("f_deposit").value||0);const note=g("f_note");const m=promoByCode(g("f_promoCode").value.trim());const finalAmount=m?Math.round(amount*(1-DISCOUNT_RATE)):amount;const mpesaCode=logForm.paymentMethod==="M-Pesa"?(g("f_mpesaCode")?.value||"").trim().toUpperCase():"";const serviceLabel=g("f_serviceNote").value.trim()||cartLabelsJoined();if(logForm.cart.length===0){note.textContent="Add at least one service.";note.style.color="var(--danger)";return;}if(!clientName||!deposit){note.textContent="Fill in client name and deposit received.";note.style.color="var(--danger)";return;}if(!plate){note.textContent="Enter the plate number.";note.style.color="var(--danger)";return;}if(logForm.paymentMethod==="M-Pesa"&&!mpesaCode){note.textContent="Enter the M-Pesa confirmation code.";note.style.color="var(--danger)";return;}if(logForm.paymentMethod==="Cash"&&!logForm.cashConfirmed){note.textContent="Confirm cash received before saving.";note.style.color="var(--danger)";return;}if(BUSY)return;BUSY=true;const _btn=g("f_submit");_btn.disabled=true;note.textContent="Saving...";note.style.color="#7a7a7a";try{const stage=logForm.closed?"Closed":(deposit>0?"Deposit":"New");await api("addSale",{clientName,phone:g("f_phone").value.trim(),plate,vehicleClass:logForm.vehicleClass,channel:g("f_channel").value,service:serviceLabel,amount,finalAmount,discount:amount-finalAmount,promoCode:m?m.code:"",deposit,paymentMethod:logForm.paymentMethod,mpesaCode,cashConfirmed:logForm.paymentMethod==="Cash"?logForm.cashConfirmed:false,closed:logForm.closed,loggedBy:g("f_loggedBy").value.trim(),stage});logForm={paymentMethod:"M-Pesa",closed:false,cashConfirmed:false,vehicleClass:0,svcGroup:"package",svcItem:"",svcFilm:"",cart:[],noteEdited:false};await loadData();showToast("Sale logged");renderAll();document.querySelector('.tab[data-tab="pipeline"]')?.click();}catch(e){note.textContent="Save failed - check connection and try once more.";note.style.color="var(--danger)";}finally{BUSY=false;const b=document.getElementById("f_submit");if(b)b.disabled=false;}}

let pipeFilter="all";
function renderPipeline(){const el=document.getElementById("panel-pipeline");const counts={};STAGES.forEach(s=>counts[s]=STATE.sales.filter(x=>x.stage===s).length);let list=[...STATE.sales].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(pipeFilter!=="all")list=list.filter(s=>s.stage===pipeFilter);let html=`<div style="font-size:12px;color:#9a9a9a;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;">How it works: a new booking starts at <strong style="color:#e8e8e8;">New</strong>. Once a deposit is taken it moves to <strong style="color:var(--warn);">Deposit paid</strong>. Tap <strong style="color:#7aa8ff;">In progress</strong> when work begins, then <strong style="color:var(--lime);">Closed</strong> when the job is done. Tap any stage on a card to move it. "Mark balance received" only clears money owed — it does NOT close the job, since a client can pay in full before the work is finished. Only closing a job asks whether the balance was paid.</div><div class="cards">${STAGES.map(st=>`<div class="card" style="cursor:pointer;${pipeFilter===st?'border-color:var(--lime);':''}" onclick="setPipeFilter('${st}')"><div class="label">${STAGE_LABELS[st]}</div><div class="value">${counts[st]}</div></div>`).join("")}</div><button class="btn-outline" style="margin-bottom:12px;" onclick="setPipeFilter('all')">Show all</button>`;if(list.length===0){html+=`<div class="empty">No jobs here yet.</div>`;}else list.forEach(s=>{const p=s.promoCode?promoByCode(s.promoCode):null;const bal=Math.max(0,Number(s.finalAmount)-Number(s.deposit));const paid=bal===0&&Number(s.finalAmount)>0;html+=`<div class="item"><div class="item-top"><div><div style="font-weight:700;font-size:14px;">${esc(s.clientName)}${s.plate?` <span style="color:var(--lime);font-size:12px;">&middot; ${esc(s.plate)}</span>`:""}</div><div style="font-size:11.5px;color:#8a8a8a;margin-top:2px;">${esc(s.service||"-")} &middot; ${esc(s.channel)}</div></div><span class="badge stage-${s.stage}">${STAGE_LABELS[s.stage]}</span></div><div class="stat-row"><span>Total <strong>${money(s.finalAmount)}</strong></span><span>Deposit <strong>${money(s.deposit)}</strong></span><span>Balance <strong style="color:${paid?'var(--lime)':bal>0?'var(--warn)':'#fff'};">${paid?"PAID IN FULL":money(bal)}</strong></span></div>${s.promoCode?`<div style="font-size:11.5px;color:var(--lime);margin-top:6px;">Promo: ${esc(s.promoCode)} (${esc(p?p.owner:"unlinked")})</div>`:""}<div class="stage-steps">${STAGES.map(st=>`<div class="stage-step ${STAGES.indexOf(st)<=STAGES.indexOf(s.stage)?'done':''}" onclick="moveStage('${s.id}','${st}')">${STAGE_LABELS[st]}</div>`).join("")}</div><div style="display:flex;gap:8px;margin-top:10px;">${bal>0?`<button class="btn-outline" style="flex:1;color:var(--lime);border-color:var(--lime);" onclick="markPaidFromPipe('${s.id}')">Mark balance received</button>`:""}<button class="btn-outline" style="flex:1;" onclick="makeReceipt('${s.id}')">Receipt</button>${ROLE==="owner"?`<button class="btn-outline" style="color:var(--danger);" onclick="deleteSale('${s.id}')">Delete</button>`:""}</div></div>`;});el.innerHTML=html;}
function setPipeFilter(f){pipeFilter=f;renderPipeline();}
async function moveStage(id,stage){
  if(BUSY)return;BUSY=true;try{
  // When moving to Closed, offer to record the balance as fully paid.
  if(stage==="Closed"){
    const s=STATE.sales.find(x=>x.id===id);
    const bal=s?Math.max(0,Number(s.finalAmount)-Number(s.deposit)):0;
    if(bal>0){
      if(confirm("Close this job and mark the balance of "+money(bal)+" as PAID IN FULL?\n\nOK = paid in full (balance cleared)\nCancel = close but balance still owed")){
        await api("markPaid",{id});
        await loadData();showToast("Closed & paid in full");renderAll();return;
      }
    }
  }
  await api("setStage",{id,stage});await loadData();showToast("Moved to "+STAGE_LABELS[stage]);renderAll();
  }catch(e){showToast("Update failed - try again",true);}finally{BUSY=false;}
}
async function markPaidFromPipe(id){
  if(BUSY)return;
  const s=STATE.sales.find(x=>x.id===id); if(!s)return;
  const bal=Math.max(0,Number(s.finalAmount)-Number(s.deposit));
  if(!confirm("Mark balance of "+money(bal)+" as received?\n\nThis only clears the balance — it does NOT close the job. Use the stage steps below to close it once the work is done."))return;
  BUSY=true;try{await api("clearBalance",{id});await loadData();showToast("Balance cleared");renderAll();}catch(e){showToast("Failed - try again",true);}finally{BUSY=false;}
}
async function deleteSale(id){if(BUSY)return;if(!confirm("Delete this reservation?"))return;BUSY=true;try{await api("deleteSale",{id});await loadData();renderAll();}catch(e){showToast("Failed - try again",true);}finally{BUSY=false;}}

let vehQuery="";
function membershipForPlate(plate){const p=String(plate||"").trim().toUpperCase();return STATE.members.find(m=>String(m.plate||"").trim().toUpperCase()===p)||null;}
function normalizePhone(phone){const d=String(phone||"").replace(/\D/g,"");return d.length>=9?d.slice(-9):d;}
function ownerKey(v){const p=normalizePhone(v.phone);if(p)return "p:"+p;const n=String(v.ownerName||"").trim().toLowerCase();if(n)return "n:"+n;return "v:"+String(v.plate||"").trim().toUpperCase();}
function groupVehiclesByOwner(){const groups={};STATE.vehicles.forEach(v=>{const key=ownerKey(v);if(!groups[key])groups[key]={ownerName:v.ownerName||"",phone:v.phone||"",vehicles:[]};groups[key].vehicles.push(v);if(!groups[key].ownerName&&v.ownerName)groups[key].ownerName=v.ownerName;if(!groups[key].phone&&v.phone)groups[key].phone=v.phone;});return Object.values(groups);}
function renderVehicles(){const el=document.getElementById("panel-vehicles");
  el.innerHTML=`<label>Search by plate, owner or phone<input id="veh_q" placeholder="e.g. KDS 112Z or 07XX" value="${esc(vehQuery)}"></label><div id="veh_results"></div>`;
  const input=document.getElementById("veh_q");
  input.addEventListener("input",e=>{vehQuery=e.target.value;renderVehicleResults();});
  renderVehicleResults();
}
function renderVehicleResults(){
  const el=document.getElementById("veh_results");if(!el)return;
  let owners=groupVehiclesByOwner();
  if(vehQuery){const q=vehQuery.trim().toLowerCase();owners=owners.filter(o=>String(o.ownerName||"").toLowerCase().includes(q)||String(o.phone||"").includes(q)||o.vehicles.some(v=>String(v.plate||"").toLowerCase().includes(q)));}
  owners.sort((a,b)=>String(a.ownerName||"zzz").localeCompare(String(b.ownerName||"zzz")));
  if(owners.length===0){el.innerHTML=`<div class="empty">${STATE.vehicles.length===0?"No vehicles yet — they're created automatically the first time you log a sale with a plate number.":"No match for that search."}</div>`;return;}
  el.innerHTML=owners.map(o=>{
    const allSales=o.vehicles.flatMap(v=>vehicleSales(v.plate));
    const closedSales=allSales.filter(s=>s.stage==="Closed");
    const spent=closedSales.reduce((a,s)=>a+Number(s.finalAmount||0),0);
    const owed=allSales.reduce((a,s)=>a+Math.max(0,Number(s.finalAmount||0)-Number(s.deposit||0)),0);
    const vehiclesHtml=o.vehicles.map(v=>{
      const sales=vehicleSales(v.plate).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
      const last=sales[0]?sales[0].timestamp:null;
      const member=membershipForPlate(v.plate);
      return `<div style="border-top:1px solid var(--border);padding:10px 0;"><div class="item-top"><div><div style="font-weight:700;font-size:14px;letter-spacing:0.3px;">${esc(v.plate)}</div>${(v.make||v.model)?`<div style="font-size:11px;color:#7a7a7a;margin-top:2px;">${esc(v.make||"")} ${esc(v.model||"")} · ${v.vehicleClass==1?"SUV":"Saloon"}</div>`:`<div style="font-size:11px;color:#7a7a7a;margin-top:2px;">${v.vehicleClass==1?"SUV":"Saloon"} pricing</div>`}</div>${member?`<span class="badge lime">${esc(member.tier)} member</span>`:`<span class="badge">${sales.length} visit${sales.length===1?"":"s"}</span>`}</div><details style="margin-top:6px;"><summary style="cursor:pointer;font-size:12px;color:#9a9a9a;">History (${sales.length})</summary>${sales.length===0?`<div style="font-size:11.5px;color:#7a7a7a;padding:6px 0;">No jobs logged for this plate yet.</div>`:sales.map(s=>`<div style="font-size:11.5px;color:#b5b5b5;padding:6px 0;border-top:1px solid var(--border);">${String(s.timestamp).slice(0,10)} &middot; ${esc(s.service||"-")} &middot; ${money(s.finalAmount)} &middot; <span style="color:var(--lime);">${STAGE_LABELS[s.stage]}</span></div>`).join("")}</details><div style="font-size:10.5px;color:#7a7a7a;margin-top:4px;">Last visit ${last?String(last).slice(0,10):"—"}</div></div>`;
    }).join("");
    return `<div class="item"><div class="item-top"><div><div style="font-weight:700;font-size:15px;">${esc(o.ownerName||"No owner name")}</div><div style="font-size:11.5px;color:#8a8a8a;margin-top:2px;">${o.phone?esc(o.phone):"No phone"}</div></div><span class="badge">${o.vehicles.length} vehicle${o.vehicles.length===1?"":"s"}</span></div><div class="stat-row"><span>Spent <strong style="color:var(--lime);">${money(spent)}</strong></span><span>Owed <strong>${money(owed)}</strong></span></div>${vehiclesHtml}</div>`;
  }).join("");
}

function renderPromos(){const el=document.getElementById("panel-promos");let html=`<div class="item"><div style="font-family:'Space Grotesk';font-weight:700;font-size:13.5px;margin-bottom:10px;">New partner promo code</div><label>Code<input id="p_code" placeholder="e.g. NAIROBICLUB" style="text-transform:uppercase;"></label><label>Partner / owner name<input id="p_owner" placeholder="e.g. @nairobicarclub"></label><label>Category<select id="p_category">${CATEGORIES.map(c=>`<option>${c}</option>`).join("")}</select></label><div style="font-size:11.5px;color:#7a7a7a;margin-bottom:12px;">8% off for the client, 10% commission for the partner on close. Duplicate codes are blocked automatically.</div><button class="btn" id="p_submit">Create code</button><div id="p_note" style="font-size:11.5px;margin-top:8px;"></div></div>`;if(STATE.promos.length===0){html+=`<div class="empty">No promo codes yet.</div>`;}else STATE.promos.forEach(p=>{const st=promoStats(p.code);html+=`<div class="item"><div class="item-top"><div><div style="font-weight:700;font-size:14px;">${esc(p.code)}</div><div style="font-size:11.5px;color:#8a8a8a;">${esc(p.owner)} &middot; ${esc(p.category)}</div></div>${ROLE==="owner"?`<button class="btn-outline" style="color:var(--danger);" onclick="deletePromo('${p.id}')">Delete</button>`:""}</div><div class="stat-row"><span>Site uses <strong>${st.siteUses}</strong></span><span>Closed <strong>${st.closed}</strong></span><span>Commission <strong style="color:var(--lime);">${money(st.commission)}</strong></span></div><a href="?code=${encodeURIComponent(p.code)}" target="_blank" style="display:block;margin-top:10px;text-align:center;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--lime);font-size:12px;font-weight:600;text-decoration:none;">Open partner link &#8599;</a></div>`;});el.innerHTML=html;document.getElementById("p_submit").addEventListener("click",submitPromo);}
async function submitPromo(){const code=document.getElementById("p_code").value.trim().toUpperCase();const owner=document.getElementById("p_owner").value.trim();const category=document.getElementById("p_category").value;const note=document.getElementById("p_note");if(!code||!owner){note.textContent="Enter both a code and a partner name.";note.style.color="var(--danger)";return;}if(BUSY)return;BUSY=true;note.textContent="Creating...";note.style.color="#7a7a7a";try{const res=await api("addPromo",{code,owner,category,createdAt:new Date().toISOString()});if(res&&res.ok===false){note.textContent=res.error||"Could not create code.";note.style.color="var(--danger)";return;}await loadData();showToast("Promo code created");renderAll();}catch(e){note.textContent="Failed - try again";note.style.color="var(--danger)";}finally{BUSY=false;}}
async function deletePromo(id){if(!confirm("Delete this promo code?"))return;await api("deletePromo",{id});await loadData();renderAll();}

function renderMembers(){const el=document.getElementById("panel-members");let html=`<div style="font-size:12px;color:#9a9a9a;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;">The Maintenance Club: members pay monthly for regular upkeep. A fuller plate-based membership engine (member numbers, quarterly to gold upgrade, maintenance-due alerts, revoke rights) is coming in a later update. For now this keeps a simple member list.</div><div class="item"><div style="font-family:'Space Grotesk';font-weight:700;font-size:13.5px;margin-bottom:10px;">Add member</div><label>Name<input id="mm_name"></label><label>Phone<input id="mm_phone"></label><label>Tier<select id="mm_tier"><option>Standard</option><option>Silver</option><option>Gold</option><option>Car Club Partner</option></select></label><label>M-Pesa reference<input id="mm_ref" style="text-transform:uppercase;"></label><button class="btn" id="mm_submit">Add member</button></div>`;if(STATE.members.length===0){html+=`<div class="empty">No members yet.</div>`;}else STATE.members.forEach(m=>{html+=`<div class="item" style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:13.5px;">${esc(m.name)}</div><div style="font-size:11.5px;color:#8a8a8a;">${esc(m.tier)} &middot; joined ${String(m.joinedAt||"").slice(0,10)}${m.mpesaRef?` &middot; ${esc(m.mpesaRef)}`:""}</div></div>${ROLE==="owner"?`<button class="btn-outline" style="color:var(--danger);" onclick="deleteMember('${m.id}')">Delete</button>`:""}</div>`;});el.innerHTML=html;document.getElementById("mm_submit").addEventListener("click",submitMember);}
async function submitMember(){if(BUSY)return;const name=document.getElementById("mm_name").value.trim();if(!name)return;BUSY=true;try{await api("addMember",{name,phone:document.getElementById("mm_phone").value.trim(),tier:document.getElementById("mm_tier").value,mpesaRef:document.getElementById("mm_ref").value.trim().toUpperCase(),joinedAt:new Date().toISOString().slice(0,10)});await loadData();showToast("Member added");renderAll();}catch(e){showToast("Failed - try again",true);}finally{BUSY=false;}}
async function deleteMember(id){if(!confirm("Remove this member?"))return;await api("deleteMember",{id});await loadData();renderAll();}

function renderReports(){const el=document.getElementById("panel-reports");if(ROLE!=="owner"){el.innerHTML="";return;}const months=[];const now=new Date();for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({key:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"),label:d.toLocaleString('en',{month:'short'})});}const revByMonth=months.map(m=>({...m,rev:STATE.sales.filter(s=>s.stage==="Closed"&&String(s.timestamp).slice(0,7)===m.key).reduce((a,s)=>a+Number(s.finalAmount||0),0)}));const maxRev=Math.max(1,...revByMonth.map(m=>m.rev));let html=`<div class="section-title">Monthly revenue (last 6 months)</div><div class="item"><div class="chart">${revByMonth.map(m=>`<div class="bar-col"><div class="bar-val">${m.rev?Math.round(m.rev/1000)+'k':''}</div><div class="bar" style="height:${Math.round((m.rev/maxRev)*100)}%;"></div><div class="bar-label">${m.label}</div></div>`).join("")}</div></div><div class="section-title">Partner / influencer ranking</div>${renderPartnerRanking(20)}`;const owing=STATE.sales.filter(s=>Math.max(0,Number(s.finalAmount)-Number(s.deposit))>0).sort((a,b)=>(b.finalAmount-b.deposit)-(a.finalAmount-a.deposit));html+=`<div class="section-title">Outstanding balances</div>`;if(owing.length===0){html+=`<div class="empty">Everyone's paid up.</div>`;}else owing.forEach(s=>{html+=`<div class="item" style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:13.5px;">${esc(s.clientName)}</div><div style="font-size:11.5px;color:#8a8a8a;">${esc(s.service||"-")} &middot; ${STAGE_LABELS[s.stage]}</div></div><div style="text-align:right;"><div style="font-weight:700;color:var(--warn);">${money(Math.max(0,s.finalAmount-s.deposit))}</div><div style="font-size:10.5px;color:#7a7a7a;">of ${money(s.finalAmount)}</div></div></div>`;});el.innerHTML=html;}
function renderPartnerRanking(limit){const ranked=STATE.promos.map(p=>({...p,...promoStats(p.code)})).sort((a,b)=>b.commission-a.commission).slice(0,limit);if(ranked.length===0)return`<div class="empty">No partners yet.</div>`;return ranked.map((p,i)=>`<div class="item" style="display:flex;justify-content:space-between;align-items:center;"><div style="display:flex;align-items:center;"><span class="rank-num">${i+1}</span><div><div style="font-weight:700;font-size:13.5px;">${esc(p.owner)}</div><div style="font-size:11px;color:#8a8a8a;">${esc(p.code)} &middot; ${esc(p.category)} &middot; ${p.closed} closed</div></div></div><div style="font-weight:700;color:var(--lime);">${money(p.commission)}</div></div>`).join("");}

function makeReceipt(id){const s=STATE.sales.find(x=>x.id===id);if(!s)return;const bal=Math.max(0,Number(s.finalAmount)-Number(s.deposit));const w=window.open("","_blank");w.document.write(`<html><head><title>Receipt - ${esc(s.clientName)}</title><style>body{font-family:Arial,sans-serif;max-width:420px;margin:20px auto;padding:24px;color:#111;}.h{display:flex;align-items:center;gap:10px;border-bottom:2px solid #121212;padding-bottom:12px;}.g{width:40px;height:40px;background:#B8FF00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;}h2{margin:0;font-size:18px;}.muted{color:#666;font-size:12px;}table{width:100%;border-collapse:collapse;margin-top:16px;font-size:14px;}td{padding:7px 0;border-bottom:1px solid #eee;}td:last-child{text-align:right;font-weight:600;}.tot td{border-top:2px solid #121212;border-bottom:none;font-size:16px;font-weight:700;padding-top:10px;}.foot{margin-top:20px;font-size:11px;color:#888;text-align:center;}</style></head><body><div class="h"><div class="g">G</div><div><h2>Glossmith</h2><div class="muted">Auto Atelier &middot; Nairobi</div></div></div><div style="margin-top:14px;font-size:13px;"><strong>${esc(s.clientName)}</strong>${s.plate?` &middot; ${esc(s.plate)}`:""}<br><span class="muted">${esc(s.phone||"")} &middot; ${String(s.timestamp).slice(0,10)}</span></div><table><tr><td>${esc(s.service||"Service")}</td><td>${money(s.amount)}</td></tr>${s.discount>0?`<tr><td>Promo ${esc(s.promoCode)} (8% off)</td><td>-${money(s.discount)}</td></tr>`:""}<tr><td>Deposit paid (${esc(s.paymentMethod)}${s.mpesaCode?" &middot; "+esc(s.mpesaCode):""})</td><td>-${money(s.deposit)}</td></tr><tr class="tot"><td>Balance due</td><td>${money(bal)}</td></tr></table><div class="foot">Thank you for choosing Glossmith &middot; ${STAGE_LABELS[s.stage]}</div></body></html>`);w.document.close();setTimeout(()=>w.print(),400);}

async function renderPartnerView(code){document.getElementById("gate").style.display="none";const el=document.getElementById("partnerView");el.style.display="block";await loadData();const promo=promoByCode(code);if(!promo){el.innerHTML=`<div class="empty">That promo code no longer exists.</div>`;return;}const st=promoStats(code);el.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:16px;"><span class="badge lime">Partner view</span></div><div class="item" style="padding:18px;margin-bottom:16px;"><div style="font-size:11px;color:#8a8a8a;text-transform:uppercase;">Promo code</div><div style="font-family:'Space Grotesk';font-weight:700;font-size:24px;color:var(--lime);margin-top:4px;">${esc(promo.code)}</div><div style="font-size:12.5px;color:#9a9a9a;margin-top:2px;">${esc(promo.owner)} &middot; ${esc(promo.category)}</div></div><div class="cards"><div class="card"><div class="label">Applied on site</div><div class="value">${st.siteUses}</div></div><div class="card"><div class="label">Closed sales</div><div class="value">${st.closed}</div></div><div class="card"><div class="label">Your commission</div><div class="value">${money(st.commission)}</div><div class="sub">10% of closed sales</div></div></div><div style="font-size:11.5px;color:#6b6b6b;">Only your code's activity is shown here - no other business figures.</div>`;}

function renderAll(){[renderDashboard,renderLog,renderPipeline,renderVehicles,renderPromos,renderMembers,renderReports].forEach(function(fn){try{fn();}catch(e){console.error("render error in "+fn.name,e);}});}
(async function init(){if(WEB_APP_URL.includes("YOUR_WEB_APP_URL_HERE")){document.getElementById("gate").style.display="none";const b=document.getElementById("setupBanner");b.style.display="block";b.textContent="Paste your Google Apps Script Web App URL into WEB_APP_URL near the top of this file.";return;}const params=new URLSearchParams(window.location.search);const code=params.get("code");if(code){renderPartnerView(code);return;}buildKeypad();const saved=sessionStorage.getItem("gs_role");if(saved){ROLE=saved;enterApp();}})();
</script>
</body>
</html>

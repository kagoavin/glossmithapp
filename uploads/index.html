  body{margin:0;background:var(--black);color:var(--white);font-family:'Sora',sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 90px;}
  #gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .gate-logo{width:56px;height:56px;border-radius:14px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--black);font-size:26px;margin-bottom:18px;}
  .gate-title{font-family:'Space Grotesk';font-weight:700;font-size:22px;margin-bottom:4px;}
  .gate-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
  .pin-display{display:flex;gap:10px;margin-bottom:22px;}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);}
  .pin-dot.filled{background:var(--lime);border-color:var(--lime);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:240px;}
  .key{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 0;font-size:20px;font-weight:600;color:var(--white);cursor:pointer;font-family:'Space Grotesk';}
  .key:active{background:var(--lime);color:var(--black);}
  .gate-err{color:var(--danger);font-size:13px;margin-top:16px;height:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--black);font-size:15px;}

  .brand h1 span{color:var(--lime);}

  .tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{background:transparent;color:#b5b5b5;border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;font-family:'Space Grotesk';cursor:pointer;white-space:nowrap;}
  .tab.active{background:var(--lime);color:var(--black);border:none;}
  .panel{display:none;}
  .panel.active{display:block;}
  label{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:#9a9a9a;font-family:'Space Grotesk';margin-bottom:12px;}
  input,select{background:#0f0f0f;border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--white);font-size:14px;font-family:'Sora';outline:none;width:100%;}
  input:focus,select:focus{border-color:var(--lime);}
  .form-wrap{max-width:520px;display:flex;flex-direction:column;}
  .btn{background:var(--lime);color:var(--black);border:none;border-radius:10px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:'Space Grotesk';}
  .btn:disabled{background:var(--grey);color:#8a8a8a;cursor:not-allowed;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:#c9c9c9;border-radius:8px;padding:9px 12px;font-size:12.5px;cursor:pointer;font-family:'Sora';}
  .toggle{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--white);font-size:13px;cursor:pointer;margin-bottom:12px;width:100%;text-align:left;}
  .toggle.on{border-color:var(--lime);color:var(--lime);}
  .cards{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;flex:1 1 140px;}
  .card .label{font-size:11px;color:#8a8a8a;text-transform:uppercase;letter-spacing:0.4px;}
  .card .value{font-family:'Space Grotesk';font-weight:700;font-size:19px;margin-top:8px;}
  .card .sub{font-size:11px;color:#7a7a7a;margin-top:3px;}
  .section-title{font-family:'Space Grotesk';font-weight:700;font-size:14px;margin:20px 0 8px;}
  .item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .badge{background:#2a2a2a;color:#c9c9c9;font-size:11px;font-weight:600;letter-spacing:0.3px;padding:3px 8px;border-radius:999px;text-transform:uppercase;white-space:nowrap;}
  .badge.lime{background:rgba(184,255,0,0.14);color:var(--lime);}
  .badge.stage-New{background:rgba(255,255,255,0.08);color:#e8e8e8;}
  .badge.stage-Deposit{background:rgba(201,138,58,0.18);color:var(--warn);}
  .badge.stage-Progress{background:rgba(90,150,255,0.18);color:#7aa8ff;}
  .badge.stage-Closed{background:rgba(184,255,0,0.14);color:var(--lime);}
  .stat-row{display:flex;justify-content:space-between;margin-top:10px;font-size:12.5px;color:#9a9a9a;gap:8px;flex-wrap:wrap;}
  .stat-row strong{color:var(--white);}
  .promo-hint{font-size:12px;background:rgba(184,255,0,0.08);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:12px;color:var(--lime);}
  .empty{color:#7a7a7a;font-size:13px;padding:24px 0;text-align:center;border:1px dashed var(--border);border-radius:10px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--lime);color:var(--black);font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none;z-index:50;max-width:90%;text-align:center;}
  .toast.err{background:var(--danger);color:#fff;}
  .method-row{display:flex;gap:8px;margin-bottom:12px;}
  .method-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:#b5b5b5;font-weight:600;font-size:13px;cursor:pointer;}
  .method-btn.active{border-color:var(--lime);background:rgba(184,255,0,0.1);color:var(--lime);}
  .stage-steps{display:flex;gap:6px;margin-top:10px;}
  .stage-step{flex:1;text-align:center;font-size:10.5px;font-weight:600;padding:6px 2px;border-radius:6px;background:#0f0f0f;border:1px solid var(--border);color:#7a7a7a;cursor:pointer;}
  .stage-step.done{background:rgba(184,255,0,0.12);border-color:var(--lime);color:var(--lime);}
  .setup-url{font-size:11px;color:#7a7a7a;margin:16px;word-break:break-all;}
  .subtabs{display:flex;gap:8px;margin-bottom:14px;}
  .subtab{flex:1;text-align:center;background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px;font-size:12.5px;font-weight:700;font-family:'Space Grotesk';color:#b5b5b5;cursor:pointer;}
  .subtab.active{background:rgba(184,255,0,0.1);border-color:var(--lime);color:var(--lime);}
  .cart-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--border);font-size:12.5px;}
  .cart-x{background:none;border:none;color:var(--danger);font-size:18px;line-height:1;cursor:pointer;padding:0 4px;}
  .money-split{display:flex;gap:10px;margin-bottom:14px;}
  .money-split .card{flex:1;}
</style>

/* ================= HELPERS ================= */
const money=n=>"KSh "+Number(n||0).toLocaleString("en-KE",{maximumFractionDigits:0});
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const normalizePlate=p=>String(p||"").toUpperCase().replace(/\s+/g,"");
const formatPlate=p=>{const n=normalizePlate(p);return n.length===7?n.slice(0,3)+" "+n.slice(3):n;};
const normalizePhone=phone=>{const d=String(phone||"").replace(/\D/g,"");return d.length>=9?d.slice(-9):d;};
function num(v){return Number(v||0);}
function saleBalance(s){return Math.max(0,num(s.finalAmount)-num(s.deposit));}
function isCleared(s){return num(s.finalAmount)>0 && saleBalance(s)===0;}
function deriveStage(s){if(s.stage&&STAGES.includes(s.stage))return s.stage;if(num(s.deposit)>=num(s.finalAmount)&&num(s.finalAmount)>0)return "Closed";if(num(s.deposit)>0)return "Deposit";return "New";}

/* ================= DATA LAYER ================= */
async function api(action,payload){
  const r=await fetch(WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,payload:payload||{}})});
  return r.json();
}
async function loadData(){
  const r=await fetch(WEB_APP_URL);const d=await r.json();
  STATE.serverVersion=d.version||null;
  STATE.sales=(d.sales||[]).map(s=>({...s,plate:normalizePlate(s.plate),stage:deriveStage(s)}));
  STATE.promos=d.promos||[];STATE.promoEvents=d.promoEvents||[];STATE.members=d.members||[];STATE.jobData=d.jobData||[];STATE.staff=d.staff||[];
  STATE.vehicles=vehiclesFromSales();
  checkServerVersion();
}
// Vehicles derived entirely from Sales rows — most recent sale wins for details.
function vehiclesFromSales(){
  const map={};
  [...STATE.sales].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).forEach(s=>{
    const p=normalizePlate(s.plate);if(!p)return;
    if(!map[p])map[p]={plate:p,model:"",clientName:"",phone:"",vehicleClass:""};
    if(s.model)map[p].model=s.model;
    if(s.clientName)map[p].clientName=s.clientName;
    if(s.phone)map[p].phone=s.phone;
    if(s.vehicleClass!==undefined&&s.vehicleClass!==null&&s.vehicleClass!=="")map[p].vehicleClass=s.vehicleClass;
  });
  return Object.values(map);
}
function findVehicle(plate){const p=normalizePlate(plate);if(!p)return null;return STATE.vehicles.find(v=>normalizePlate(v.plate)===p)||null;}
function vehicleSales(plate){const p=normalizePlate(plate);return STATE.sales.filter(s=>normalizePlate(s.plate)===p);}
function promoByCode(code){if(!code)return null;return STATE.promos.find(p=>String(p.code).toUpperCase()===String(code).trim().toUpperCase())||null;}
function memberForPlate(plate){const p=normalizePlate(plate);return STATE.members.find(m=>normalizePlate(m.plate)===p)||null;}

function checkServerVersion(){
  const b=document.getElementById("versionBanner");if(!b)return;
  const fixBtn=`<button onclick="openConnect()" style="display:block;margin-top:10px;background:#fff;color:#a03a30;border:none;border-radius:8px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer;width:100%;">🔌 Fix connection — paste your new backend URL</button>`;
  if(!STATE.serverVersion){b.style.display="block";b.innerHTML="⚠️ The app is talking to an <b>old backend</b>. Easiest permanent fix: in Apps Script do <b>Deploy → New deployment</b> (Web app, Execute as Me, Anyone), copy the NEW URL, then tap the button below and paste it."+fixBtn;return;}
  if(STATE.serverVersion!==EXPECTED_SCRIPT_VERSION){b.style.display="block";b.innerHTML="⚠️ Backend is version \""+esc(STATE.serverVersion)+"\" but this app expects \""+esc(EXPECTED_SCRIPT_VERSION)+"\". Paste the latest Code.gs in Apps Script, do <b>Deploy → New deployment</b>, copy the NEW URL, then tap below."+fixBtn;return;}
  b.style.display="none";
}
/* ---- Connect backend: paste an /exec URL, test it live, save on this device ---- */
function openConnect(){
  let m=document.getElementById("connectModal");
  if(!m){m=document.createElement("div");m.id="connectModal";m.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;";document.body.appendChild(m);}
  m.innerHTML=`<div style="background:var(--black);border:1px solid var(--border);border-radius:14px;padding:18px;max-width:520px;width:100%;">
    <div style="display:flex;justify-content:space-between;align-items:center;"><div style="font-family:'Space Grotesk';font-weight:700;font-size:15px;">Connect backend</div><button onclick="document.getElementById('connectModal').remove()" style="background:none;border:none;color:#9a9a9a;font-size:22px;cursor:pointer;">×</button></div>
    <div style="font-size:12px;color:#9a9a9a;margin:8px 0 12px;line-height:1.5;">In Apps Script: <b>Deploy → New deployment → Web app → Execute as: Me → Anyone → Deploy</b>. Copy the URL it gives you (ends in <b>/exec</b>) and paste it here. The app will test it before saving.</div>
    <label>Web App URL<input id="cn_url" placeholder="https://script.google.com/macros/s/…/exec" value="${esc(WEB_APP_URL)}"></label>
    <button class="btn" style="width:100%;" onclick="testAndSaveUrl()">Test & save</button>
    <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="resetUrl()">Reset to built-in URL</button>
    <div id="cn_note" style="font-size:12px;color:#7a7a7a;margin-top:10px;min-height:16px;"></div>
  </div>`;
}
async function testAndSaveUrl(){
  const url=document.getElementById("cn_url").value.trim();
  const note=document.getElementById("cn_note");
  if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url)){note.textContent="That doesn't look like an Apps Script /exec URL.";note.style.color="var(--danger)";return;}
  note.textContent="Testing connection…";note.style.color="#7a7a7a";
  try{
    const r=await fetch(url);const d=await r.json();
    if(!d||typeof d!=="object"){note.textContent="URL responded but not with app data.";note.style.color="var(--danger)";return;}
    if(!d.version){note.textContent="Connected, but that backend is an OLD Code.gs (no version). Paste the latest Code.gs into that script and deploy again.";note.style.color="var(--danger)";return;}
    if(d.version!==EXPECTED_SCRIPT_VERSION){note.textContent="Connected, but backend is \""+d.version+"\" (app expects \""+EXPECTED_SCRIPT_VERSION+"\"). Paste the latest Code.gs there, Deploy → New deployment, and use that URL.";note.style.color="var(--danger)";return;}
    setWebAppUrl(url);WEB_APP_URL=url;
    note.textContent="✅ Connected to the current backend ("+d.version+"). Saved — reloading…";note.style.color="var(--lime)";
    await loadData();renderAll();
    setTimeout(()=>{const mm=document.getElementById("connectModal");if(mm)mm.remove();showToast("Backend connected — all systems current");},900);
  }catch(e){note.textContent="Could not reach that URL: "+(e.message||e);note.style.color="var(--danger)";}
}

/* ================= GATE / KEYPAD ================= */
function buildKeypad(){
  const kp=document.getElementById("keypad");
  ["1","2","3","4","5","6","7","8","9","","0","⌫"].forEach(k=>{
    if(k===""){kp.appendChild(document.createElement("div"));return;}
    const b=document.createElement("button");b.className="key";b.textContent=k;
    b.onclick=()=>keyPress(k);kp.appendChild(b);
  });
  renderPinDots();
}
function renderPinDots(){
  const d=document.getElementById("pinDisplay");d.innerHTML="";
  for(let i=0;i<4;i++){const dot=document.createElement("div");dot.className="pin-dot"+(i<pinBuffer.length?" filled":"");d.appendChild(dot);}
}
async function keyPress(k){
  if(k==="⌫"){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(pinBuffer.length>=4)return;
  pinBuffer+=k;renderPinDots();
  if(pinBuffer.length===4){
    const pin=pinBuffer;
    try{const res=await api("checkPin",{pin});
      if(res.role){ROLE=res.role;sessionStorage.setItem("gs_role",ROLE);enterApp();}
      else{document.getElementById("gateErr").textContent="Wrong PIN";pinBuffer="";renderPinDots();}
    }catch(e){document.getElementById("gateErr").textContent="Connection error";pinBuffer="";renderPinDots();}
  }
}
function logout(){sessionStorage.removeItem("gs_role");location.reload();}

async function enterApp(){
  document.getElementById("gate").style.display="none";
  document.getElementById("mainApp").style.display="block";
  document.getElementById("roleChip").textContent=(ROLE==="owner"?"Owner":"Staff")+" · Lock";
  const bt2=document.getElementById("buildTagApp");if(bt2)bt2.textContent=EXPECTED_SCRIPT_VERSION;
  buildTabs();await loadData();renderAll();
}

  const tabs=document.getElementById("tabs");tabs.innerHTML="";
  all.filter(t=>!t.owner||ROLE==="owner").forEach((t,i)=>{
    const b=document.createElement("button");b.className="tab"+(i===0?" active":"");b.textContent=t.label;b.dataset.tab=t.id;
    b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.getElementById("panel-"+t.id).classList.add("active");};

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const el=document.getElementById("panel-dashboard");if(!el)return;
  const sales=STATE.sales;
  const closed=sales.filter(s=>s.stage==="Closed");
  const revenue=closed.reduce((a,s)=>a+num(s.finalAmount),0);
  const collected=sales.reduce((a,s)=>a+num(s.deposit),0);
  const outstanding=sales.reduce((a,s)=>a+saleBalance(s),0);
  const openJobs=sales.filter(s=>s.stage!=="Closed").length;
  el.innerHTML=`<div class="cards">
    <div class="card"><div class="label">Closed revenue</div><div class="value" style="color:var(--lime);">${money(revenue)}</div><div class="sub">${closed.length} closed job${closed.length===1?"":"s"}</div></div>
    <div class="card"><div class="label">Total collected</div><div class="value">${money(collected)}</div><div class="sub">deposits + full payments</div></div>
    <div class="card"><div class="label">Outstanding</div><div class="value" style="color:${outstanding>0?'var(--warn)':'var(--lime)'};">${money(outstanding)}</div><div class="sub">${openJobs} open job${openJobs===1?"":"s"}</div></div>
    <div class="card"><div class="label">Vehicles on file</div><div class="value">${STATE.vehicles.length}</div><div class="sub">${STATE.members.length} member${STATE.members.length===1?"":"s"}</div></div>
  </div>
  <div class="section-title">Payment mix (all money received)</div>${paymentMixHTML()}`;
}
function paymentMixHTML(){
  let cash=0,mpesa=0;
  STATE.sales.forEach(s=>{const dep=num(s.deposit);if(dep<=0)return;if(String(s.paymentMethod)==="Cash")cash+=dep;else mpesa+=dep;});
  const total=cash+mpesa;
  const pct=v=>total>0?Math.round(v/total*100):0;
  return `<div class="money-split">
    <div class="card"><div class="label">M-Pesa</div><div class="value">${money(mpesa)}</div><div class="sub">${pct(mpesa)}% of collections</div></div>
    <div class="card"><div class="label">Cash</div><div class="value">${money(cash)}</div><div class="sub">${pct(cash)}% of collections</div></div>
  </div>`;
}

function loadMakesInto(selId,current){
  const sel=document.getElementById(selId);if(!sel)return;
  const all=Object.keys(VEHICLES).sort();
  const popular=['Toyota','Nissan','Mazda','Subaru','Honda','Mitsubishi','Volkswagen','Mercedes-Benz','BMW','Land Rover','Lexus','Audi'].filter(m=>all.includes(m));
  const rest=all.filter(m=>!popular.includes(m));
  sel.innerHTML='<option value="">— Select make —</option>'+popular.map(m=>`<option value="${m}">${m}</option>`).join("")+'<option disabled>──────</option>'+rest.map(m=>`<option value="${m}">${m}</option>`).join("");
  if(current)sel.value=current;
}
function renderModelOptions(){
  const sel=document.getElementById("f_model");if(!sel)return;
  const entry=VEHICLES[logForm.make];
  if(!entry){sel.innerHTML='<option value="">— Select make first —</option>';return;}

function applyClassFromVehicle(){

}
function updateClassHint(){
  const el=document.getElementById("f_classHint");if(!el)return;
  if(logForm.make&&logForm.model){const r=detectClass(logForm.make,logForm.model);el.textContent=r.label;}

function onPlateBlur(){
  const raw=document.getElementById("f_plate").value;const plate=normalizePlate(raw);const hint=document.getElementById("f_plateHint");
  if(!plate){hint.innerHTML="";return;}
  document.getElementById("f_plate").value=formatPlate(plate);logForm.plate=plate;
  const v=findVehicle(plate);
  if(!v){hint.innerHTML=`<div style="font-size:11.5px;color:#7a7a7a;margin:-6px 0 12px;">New plate — will be saved as a new vehicle.</div>`;return;}
  const sales=vehicleSales(plate);
  hint.innerHTML=`<div style="font-size:11.5px;color:var(--lime);margin:-6px 0 12px;">Known vehicle — ${sales.length} previous visit${sales.length===1?"":"s"}. Details auto-filled.</div>`;
  // auto-fill everything we know
  if(v.clientName){logForm.clientName=v.clientName;document.getElementById("f_clientName").value=v.clientName;}
  if(v.phone){logForm.phone=v.phone;document.getElementById("f_phone").value=v.phone;}
  if(v.model){
    // find the make that owns this model
    let foundMake="";

    logForm.model=v.model;renderModelOptions();

  if(v.vehicleClass!==""&&v.vehicleClass!=null){logForm.vehicleClass=Number(v.vehicleClass)||0;}
  updateClassHint();updateSvcPreview();renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();

function priceFor(groupId,itemId,filmId,vc){
  const g=SERVICE_GROUPS.find(g=>g.id===groupId);if(!g)return null;
  const item=g.items.find(i=>i.id===itemId);if(!item)return null;
  if(groupId==="ppf"||groupId==="tint"){if(!filmId||!item.price[filmId])return null;const fo=groupId==="ppf"?PPF_FILM:TINT_FILM;const fn=(fo.find(f=>f.id===filmId)||{}).name||"";return{price:item.price[filmId][vc],label:item.name+" — "+fn};}
  if(groupId==="problem")return{price:item.price[vc],label:item.fix};
  return{price:item.price[vc],label:item.name};
}
function updateSvcPreview(){
  const el=document.getElementById("f_svcPreview");if(!el)return;
  const r=priceFor(logForm.svcGroup,logForm.svcItem,logForm.svcFilm,logForm.vehicleClass);
  if(!r){el.innerHTML="";return;}
  el.innerHTML=`<div class="promo-hint">${esc(r.label)} · ${logForm.vehicleClass==1?"SUV":"Saloon"} · <strong>${money(r.price)}</strong></div>`;

function addToCart(){

  logForm.cart.push({groupId:logForm.svcGroup,itemId:logForm.svcItem,filmId:logForm.svcFilm||""});

}
function removeFromCart(i){logForm.cart.splice(i,1);renderCartUI();syncServiceNote();updateBalanceHint();updatePromoHint();}
function cartInfo(e){return priceFor(e.groupId,e.itemId,e.filmId,logForm.vehicleClass);}
function cartTotal(){return logForm.cart.reduce((a,e)=>{const i=cartInfo(e);return a+(i?i.price:0);},0);}
function cartLabels(){return logForm.cart.map(e=>{const i=cartInfo(e);return i?i.label:"";}).filter(Boolean).join(" + ");}
function syncServiceNote(){if(logForm.noteEdited)return;const f=document.getElementById("f_serviceNote");if(f)f.value=cartLabels();}
function renderCartUI(){

  else{f.innerHTML=`<button type="button" class="toggle ${logForm.cashConfirmed?'on':''}" id="f_cashToggle">${logForm.cashConfirmed?'&#9679;':'&#9675;'} Cash physically received & counted</button>`;document.getElementById("f_cashToggle").addEventListener("click",()=>{logForm.cashConfirmed=!logForm.cashConfirmed;renderPaymentField();});}

function updatePromoHint(){
  const code=document.getElementById("f_promoCode").value.trim();const hint=document.getElementById("f_promoHint");if(!hint)return;
  if(!code){hint.innerHTML="";return;}
  const m=promoByCode(code);const amt=cartTotal();
  if(m){const fin=Math.round(amt*(1-DISCOUNT_RATE));hint.innerHTML=`<div class="promo-hint">${esc(m.owner)} · 8% off (−${money(amt-fin)}) · final ${money(fin)}</div>`;}
  else hint.innerHTML=`<div style="font-size:12px;color:var(--warn);margin-bottom:12px;">Code not found — won't be linked to a partner.</div>`;
}
function updateBalanceHint(){
  const amt=cartTotal();const dep=num(document.getElementById("f_deposit").value);const m=promoByCode(document.getElementById("f_promoCode").value.trim());const fin=m?Math.round(amt*(1-DISCOUNT_RATE)):amt;
  const el=document.getElementById("f_balanceHint");if(el)el.innerHTML=(amt&&dep)?`Balance remaining: <strong style="color:#fff;">${money(Math.max(0,fin-dep))}</strong>`:"";
}
async function submitSale(){
  const g=id=>document.getElementById(id);const note=g("f_note");
  const plate=normalizePlate(g("f_plate").value);const clientName=g("f_clientName").value.trim();
  const amount=cartTotal();const deposit=num(g("f_deposit").value);
  const m=promoByCode(g("f_promoCode").value.trim());const finalAmount=m?Math.round(amount*(1-DISCOUNT_RATE)):amount;
  const mpesaCode=logForm.paymentMethod==="M-Pesa"?(g("f_mpesaCode")?.value||"").trim().toUpperCase():"";
  const serviceLabel=g("f_serviceNote").value.trim()||cartLabels();
  if(!plate){note.textContent="Enter the number plate.";note.style.color="var(--danger)";return;}
  if(logForm.cart.length===0){note.textContent="Add at least one service.";note.style.color="var(--danger)";return;}
  if(!clientName||!deposit){note.textContent="Fill in owner name and deposit received.";note.style.color="var(--danger)";return;}
  if(logForm.paymentMethod==="M-Pesa"&&!mpesaCode){note.textContent="Enter the M-Pesa code.";note.style.color="var(--danger)";return;}
  if(logForm.paymentMethod==="Cash"&&!logForm.cashConfirmed){note.textContent="Confirm cash received.";note.style.color="var(--danger)";return;}
  if(BUSY)return;BUSY=true;g("f_submit").disabled=true;note.textContent="Saving...";note.style.color="#7a7a7a";
  try{
    const stage=logForm.closed?"Closed":(deposit>0?"Deposit":"New");
    const finalDeposit=logForm.closed?finalAmount:deposit;
    const res=await api("addSale",{plate,model:logForm.model,make:logForm.make,clientName,phone:g("f_phone").value.trim(),vehicleClass:logForm.vehicleClass,channel:g("f_channel").value,service:serviceLabel,amount,finalAmount,discount:amount-finalAmount,promoCode:m?m.code:"",deposit:finalDeposit,paymentMethod:logForm.paymentMethod,mpesaCode,cashConfirmed:logForm.paymentMethod==="Cash"?logForm.cashConfirmed:false,stage,loggedBy:g("f_loggedBy").value.trim()});
    if(!res||res.ok!==true){note.textContent="Save failed: "+((res&&res.error)||"no response");note.style.color="var(--danger)";return;}
    logForm=newLogForm();await loadData();showToast("Sale logged");renderAll();
    document.querySelector('.tab[data-tab="pipeline"]')?.click();
  }catch(e){note.textContent="Save failed: "+(e.message||e);note.style.color="var(--danger)";}
  finally{BUSY=false;const b=document.getElementById("f_submit");if(b)b.disabled=false;}
}

/* ================= PIPELINE ================= */
function renderPipeline(){
  const el=document.getElementById("panel-pipeline");if(!el)return;
  const counts={};STAGES.forEach(s=>counts[s]=STATE.sales.filter(x=>x.stage===s).length);

async function clearBalance(id){

// Daraja STK push — sends an M-Pesa prompt to the customer's phone, then
// polls for completion. On success the sale auto-marks paid with the real receipt.
let stkPolling={};
async function requestMpesa(id){
  const s=STATE.sales.find(x=>x.id===id);if(!s)return;
  const bal=saleBalance(s);
  let phone=s.phone||"";
  phone=prompt("Send M-Pesa prompt for "+money(bal)+" to which number?",phone);
  if(!phone)return;
  const statusEl=document.getElementById("stk_"+id);
  if(statusEl){statusEl.textContent="Sending prompt to "+phone+"…";statusEl.style.color="#7a7a7a";}
  try{
    const res=await api("stkPush",{saleId:id,phone,amount:bal});
    if(!res||res.ok!==true){if(statusEl){statusEl.textContent="M-Pesa: "+((res&&res.error)||"failed");statusEl.style.color="var(--danger)";}return;}
    if(statusEl){statusEl.textContent="✅ Prompt sent — ask the customer to enter their M-Pesa PIN. Waiting…";statusEl.style.color="#00d95f";}
    pollStk(id,0);
  }catch(e){if(statusEl){statusEl.textContent="Failed: "+(e.message||e);statusEl.style.color="var(--danger)";}}
}
async function pollStk(id,tries){
  if(tries>20)return; // ~60s
  if(stkPolling[id])clearTimeout(stkPolling[id]);
  stkPolling[id]=setTimeout(async()=>{
    try{
      const res=await api("stkStatus",{saleId:id});
      const statusEl=document.getElementById("stk_"+id);
      if(res&&res.status==="success"){if(statusEl){statusEl.textContent="✅ Paid in full"+(res.receipt?" · "+res.receipt:"");statusEl.style.color="var(--lime)";}await loadData();renderAll();return;}
      if(res&&res.status==="failed"){if(statusEl){statusEl.textContent="❌ "+(res.resultDesc||"Payment cancelled or failed");statusEl.style.color="var(--danger)";}return;}
      pollStk(id,tries+1);
    }catch(e){pollStk(id,tries+1);}
  },3000);
}
function makeReceipt(id){
  const s=STATE.sales.find(x=>x.id===id);if(!s)return;const bal=saleBalance(s);const paid=isCleared(s);
  const w=window.open("","_blank");
  w.document.write(`<html><head><title>Receipt</title><style>body{font-family:sans-serif;padding:24px;max-width:420px;margin:auto;}h2{margin:0;}.muted{color:#777;font-size:13px;}table{width:100%;border-collapse:collapse;margin-top:14px;}td{padding:6px 0;border-bottom:1px solid #eee;font-size:14px;}.tot{font-weight:700;}</style></head><body>
  <h2>Glossmith</h2><div class="muted">Sales receipt</div>
  <div style="margin-top:14px;font-size:13px;"><strong>${esc(s.clientName)}</strong>${s.plate?" · "+esc(formatPlate(s.plate)):""}<br><span class="muted">${esc(s.phone||"")} · ${String(s.timestamp).slice(0,10)}</span></div>
  <table><tr><td>${esc(s.service||"Service")}</td><td style="text-align:right;">${money(s.amount)}</td></tr>
  ${num(s.discount)>0?`<tr><td>Promo discount</td><td style="text-align:right;">−${money(s.discount)}</td></tr>`:""}
  <tr class="tot"><td>Total</td><td style="text-align:right;">${money(s.finalAmount)}</td></tr>
  <tr><td>Paid</td><td style="text-align:right;">${money(s.deposit)}</td></tr>

  </body></html>`);w.document.close();
}

/* ================= COMMISSION (Phase 6) ================= */
// Partner commission comes from promo-code sales, at each code's rate.
// Staff commission comes from sales they logged (loggedBy), at their staff rate.
// Pending = sale not yet paid in full. Payable = sale cleared/paid in full.
function staffRate(name){const st=(STATE.staff||[]).find(s=>String(s.name).trim().toLowerCase()===String(name).trim().toLowerCase());return st?promoRate({rate:st.rate}):0.10;}

function partnerCommissionRows(){
  const map={};
  STATE.sales.forEach(s=>{
    if(!s.promoCode)return;
    const p=promoByCode(s.promoCode);if(!p)return;
    const rate=promoRate(p);const base=num(s.finalAmount);const comm=Math.round(base*rate);
    const key=p.owner||p.code;
    if(!map[key])map[key]={owner:p.owner||p.code,code:p.code,rate:rate,pending:0,payable:0,sales:0};
    map[key].sales++;
    if(isCleared(s))map[key].payable+=comm;else map[key].pending+=comm;
  });
  return Object.values(map).sort((a,b)=>(b.pending+b.payable)-(a.pending+a.payable));
}
function staffCommissionRows(){
  const map={};
  STATE.sales.forEach(s=>{
    const who=String(s.loggedBy||"").trim();if(!who)return;
    const rate=staffRate(who);const base=num(s.finalAmount);const comm=Math.round(base*rate);
    if(!map[who])map[who]={name:who,rate:rate,pending:0,payable:0,sales:0};
    map[who].sales++;
    if(isCleared(s))map[who].payable+=comm;else map[who].pending+=comm;
  });
  return Object.values(map).sort((a,b)=>(b.pending+b.payable)-(a.pending+a.payable));
}
let commSub="partner";
function setCommSub(s){commSub=s;renderCommission();}
function renderCommission(){
  const el=document.getElementById("panel-commission");if(!el)return;
  const partners=partnerCommissionRows();const staff=staffCommissionRows();
  const pTotP=partners.reduce((a,r)=>a+r.pending,0),pTotY=partners.reduce((a,r)=>a+r.payable,0);
  const sTotP=staff.reduce((a,r)=>a+r.pending,0),sTotY=staff.reduce((a,r)=>a+r.payable,0);

// Capture + compress on-device, then upload to Drive.
function capturePhoto(kind){
  const input=document.createElement("input");input.type="file";input.accept="image/*";input.capture="environment";
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const note=document.getElementById("jm_note");note.textContent="Compressing & uploading…";note.style.color="#7a7a7a";
    try{
      const dataUrl=await compressImage(file,1280,0.7);
      const s=STATE.sales.find(x=>x.id===jobModalSaleId);
      const res=await api("uploadPhoto",{dataUrl,plate:s?s.plate:"",kind});
      if(!res||res.ok!==true){note.textContent="Upload failed: "+((res&&res.error)||"backend not deployed?");note.style.color="var(--danger)";return;}
      jobModalDraft[kind].push(res.url);note.textContent="Photo added.";note.style.color="var(--lime)";renderJobModal();
    }catch(err){note.textContent="Failed: "+(err.message||err);note.style.color="var(--danger)";}
  };
  input.click();
}
function compressImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const img=new Image();const reader=new FileReader();
    reader.onload=()=>{img.src=reader.result;};
    reader.onerror=reject;
    img.onload=()=>{
      let{width,height}=img;
      if(width>height&&width>maxDim){height=height*maxDim/width;width=maxDim;}
      else if(height>maxDim){width=width*maxDim/height;height=maxDim;}
      const canvas=document.createElement("canvas");canvas.width=width;canvas.height=height;
      canvas.getContext("2d").drawImage(img,0,0,width,height);
      resolve(canvas.toDataURL("image/jpeg",quality));
    };
    img.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function pdfFinancialSummary(){
  const sales=STATE.sales;const cleared=sales.filter(isCleared);const outstanding=sales.filter(s=>saleBalance(s)>0);
  let cash=0,mpesa=0;sales.forEach(s=>{const d=num(s.deposit);if(d<=0)return;if(String(s.paymentMethod)==="Cash")cash+=d;else mpesa+=d;});
  const clearedTotal=cleared.reduce((a,s)=>a+num(s.finalAmount),0);const outTotal=outstanding.reduce((a,s)=>a+saleBalance(s),0);
  const body=`<h1>Glossmith — Financial summary</h1><div class="muted">${new Date().toISOString().slice(0,10)}</div>
    <h2>Collections</h2><table><tr><td>M-Pesa</td><td style="text-align:right;">${money(mpesa)}</td></tr><tr><td>Cash</td><td style="text-align:right;">${money(cash)}</td></tr><tr class="tot"><td>Total collected</td><td style="text-align:right;">${money(cash+mpesa)}</td></tr></table>
    <h2>Balances</h2><table><tr><td>Cleared (paid in full) — ${cleared.length}</td><td style="text-align:right;">${money(clearedTotal)}</td></tr><tr><td>Outstanding — ${outstanding.length}</td><td style="text-align:right;">${money(outTotal)}</td></tr></table>
    <h2>Outstanding detail</h2>${outstanding.length?`<table>${outstanding.map(s=>`<tr><td>${esc(s.clientName)} · ${esc(formatPlate(s.plate))}</td><td style="text-align:right;">${money(saleBalance(s))}</td></tr>`).join("")}</table>`:`<div class="muted">All clear.</div>`}`;
  openPrint(pdfShell("Financial summary",body));
}

/* ================= INIT ================= */
(async function init(){
  if(WEB_APP_URL.includes("YOUR_WEB_APP_URL_HERE")){document.getElementById("gate").style.display="none";const b=document.getElementById("setupBanner");b.style.display="block";b.textContent="Paste your Web App URL into WEB_APP_URL.";return;}
  const bt=document.getElementById("buildTag");if(bt)bt.textContent="App build: "+EXPECTED_SCRIPT_VERSION;
  const params=new URLSearchParams(location.search);const code=params.get("code");
  if(code){renderPartnerView(code);return;}
  buildKeypad();
  const saved=sessionStorage.getItem("gs_role");
  if(saved){ROLE=saved;enterApp();}
})();
</script>
